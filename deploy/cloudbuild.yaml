steps:
  # Build backend image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/jewelry-crm-backend:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/jewelry-crm-backend:latest'
      - './backend'

  # Build frontend image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/jewelry-crm-frontend:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/jewelry-crm-frontend:latest'
      - '--build-arg'
      - 'NEXT_PUBLIC_API_URL=https://jewelry-crm-api-${_REGION}-uc.a.run.app'
      - './frontend'

  # Push images
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/jewelry-crm-backend:$COMMIT_SHA']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/jewelry-crm-frontend:$COMMIT_SHA']

  # Run DB migrations via Cloud Run job
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'jobs'
      - 'update'
      - 'jewelry-crm-migrate'
      - '--image=gcr.io/$PROJECT_ID/jewelry-crm-backend:$COMMIT_SHA'
      - '--region=${_REGION}'
      - '--command=python,manage.py,migrate'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'jobs'
      - 'execute'
      - 'jewelry-crm-migrate'
      - '--region=${_REGION}'
      - '--wait'

  # Deploy backend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'jewelry-crm-api'
      - '--image=gcr.io/$PROJECT_ID/jewelry-crm-backend:$COMMIT_SHA'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--set-env-vars=DJANGO_SETTINGS_MODULE=config.settings.production'
      - '--set-secrets=DJANGO_SECRET_KEY=django-secret-key:latest,DB_PASSWORD=db-password:latest,ZOHO_CLIENT_ID=zoho-client-id:latest,ZOHO_CLIENT_SECRET=zoho-client-secret:latest,ZOHO_REFRESH_TOKEN=zoho-refresh-token:latest,ZOHO_ORGANIZATION_ID=zoho-org-id:latest'
      - '--min-instances=1'
      - '--max-instances=10'
      - '--memory=512Mi'
      - '--cpu=1'

  # Deploy frontend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'jewelry-crm-frontend'
      - '--image=gcr.io/$PROJECT_ID/jewelry-crm-frontend:$COMMIT_SHA'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--min-instances=1'
      - '--max-instances=5'
      - '--memory=512Mi'

substitutions:
  _REGION: asia-south1

images:
  - 'gcr.io/$PROJECT_ID/jewelry-crm-backend:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/jewelry-crm-frontend:$COMMIT_SHA'
